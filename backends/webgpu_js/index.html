<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SAD Sites Viewer (WebGPU)</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="toolbar">
      <div class="brand">SAD Viewer</div>
      <div class="controls">
        <label class="file">
          <input id="fileInput" type="file" accept=".txt" />
          <span>Choose sites.txt</span>
        </label>
        <label>
          <span>view</span>
          <select id="renderModeSelect">
            <option value="0">Color</option>
            <option value="1">IDs</option>
            <option value="2">Tau</option>
            <option value="3">Anisotropy</option>
            <option value="4">Radius</option>
          </select>
        </label>
        <label class="toggle">
          <input id="dotsToggle" type="checkbox" />
          Dots
        </label>
        <button id="exportBtn" disabled>Export PNG</button>
      </div>
      <div class="status" id="status">No file loaded.</div>
    </div>
    <div class="canvas-wrap">
      <canvas id="gpuCanvas"></canvas>
      <div id="fallback" class="fallback hidden">
        WebGPU is not available in this browser.
      </div>
    </div>
    <script src="shaders.js"></script>
    <script src="main.js"></script>
  </body>
</html>
