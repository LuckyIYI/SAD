<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SAD Demo</title>
    <style>
      :root {
        --bg: #f7f7f5;
        --panel: #ffffff;
        --panel-soft: #fafaf8;
        --canvas-bg: #f1f1ec;
        --line: #e6e6df;
        --line-soft: #eeeeea;
        --text: #1d1d1f;
        --text-dim: #66666e;
        --text-soft: #9a9aa2;
        --accent: #ff7d33;
        --accent-hover: #ff9054;
        --accent-contrast: #ffffff;
        --accent-soft: #fff2ea;
        --focus: rgba(255, 125, 51, 0.28);
      }
      * { box-sizing: border-box; }
      html, body {
        height: 100%;
        margin: 0;
        font-family: "Inter", "SF Pro Text", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: var(--text);
        background: var(--bg);
        overflow: hidden;
      }
      body { display: flex; flex-direction: column; }

      .top {
        flex: none;
        padding: 10px 16px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .brand {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.01em;
        margin-right: 4px;
      }
      .brand small { font-weight: 400; color: var(--text-dim); margin-left: 6px; }
      .spacer { flex: 1 1 auto; }

      .field, .btn, .file-btn {
        font: inherit;
        font-size: 12px;
        padding: 6px 12px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: var(--panel-soft);
        color: var(--text);
        cursor: pointer;
        transition: background 120ms, border-color 120ms, color 120ms;
      }
      .field { cursor: text; }
      .btn:hover, .file-btn:hover, .field:hover { background: #ffffff; border-color: #d5d5ce; }
      .btn[disabled], .file-btn[disabled] { opacity: 0.45; cursor: not-allowed; }

      .btn-primary {
        background: var(--accent);
        color: var(--accent-contrast);
        border-color: var(--accent);
        font-weight: 600;
      }
      .btn-primary:hover:not([disabled]) {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
      }
      .btn-primary[disabled] {
        background: #f4d6c3;
        color: #c08a64;
        border-color: #f4d6c3;
      }
      .btn-ghost { background: transparent; }
      .file-btn input { display: none; }

      .bpp-group {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-soft);
      }
      .bpp-group label {
        color: var(--text-dim);
        font-size: 12px;
        white-space: nowrap;
      }
      .bpp-group input[type="range"] {
        width: 160px;
        margin: 0;
      }
      .bpp-unit {
        color: var(--text-soft);
        font-size: 11px;
      }
      .bpp-value {
        min-width: 34px;
        color: var(--text);
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        text-align: right;
      }
      .bpp-hint {
        font-size: 11px;
        color: var(--text-soft);
        white-space: nowrap;
      }

      .save-menu {
        position: relative;
      }
      .save-popover {
        position: absolute;
        top: calc(100% + 6px);
        right: 0;
        min-width: 160px;
        padding: 4px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .save-popover.hidden { display: none; }
      .save-opt {
        font: inherit;
        font-size: 12px;
        text-align: left;
        padding: 7px 12px;
        border: none;
        background: transparent;
        color: var(--text);
        border-radius: 6px;
        cursor: pointer;
      }
      .save-opt:hover { background: var(--accent-soft); }

      .status-chip {
        font-size: 11px;
        color: var(--text-dim);
        padding: 3px 10px;
        border-radius: 999px;
        background: var(--panel-soft);
        border: 1px solid var(--line-soft);
      }

      .main {
        flex: 1;
        min-height: 0;
        display: flex;
      }

      .panel {
        flex: none;
        width: 320px;
        background: var(--panel);
        border-right: 1px solid var(--line);
        overflow-y: auto;
        padding: 16px 16px 24px;
      }
      .panel.hidden { display: none; }
      .panel h3 {
        margin: 14px 0 6px;
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--text-soft);
        font-weight: 500;
      }
      .panel h3:first-child { margin-top: 0; }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 5px 0;
      }
      .row label {
        font-size: 12px;
        color: var(--text-dim);
        flex: 1;
        min-width: 0;
      }
      .row input[type="number"], .row input[type="text"] {
        width: 110px;
        font: inherit;
        font-size: 12px;
        padding: 5px 8px;
        border: 1px solid var(--line);
        background: #ffffff;
        color: var(--text);
        border-radius: 6px;
        text-align: right;
      }
      .row input[type="number"]:focus, .row input[type="text"]:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--focus);
      }
      .row input[type="checkbox"] { accent-color: var(--accent); }
      .file-inline {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .file-inline .file-btn { padding: 4px 8px; font-size: 11px; }
      .file-name { font-size: 11px; color: var(--text-soft); }

      /* Viewer area */
      .view {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        background: var(--bg);
      }
      .view-toolbar {
        flex: none;
        padding: 10px 16px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
        display: flex;
        gap: 14px;
        align-items: center;
        font-size: 12px;
      }
      .view-toolbar select {
        font: inherit;
        font-size: 12px;
        padding: 5px 10px;
        border: 1px solid var(--line);
        background: var(--panel-soft);
        color: var(--text);
        border-radius: 6px;
      }
      .view-toolbar select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--focus);
      }
      .metric-row {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        margin-left: auto;
        color: var(--text-dim);
        font-variant-numeric: tabular-nums;
      }
      .metric-row strong { color: var(--text); font-weight: 600; }

      .canvases {
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        padding: 12px;
        place-items: center;
        align-content: center;
        overflow: auto;
      }
      .canvas-card {
        position: relative;
        width: min(100%, calc(100vh - 220px), 620px);
        aspect-ratio: 1 / 1;
        background: var(--canvas-bg);
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .canvas-card canvas {
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        object-fit: contain;
        image-rendering: pixelated;
        display: block;
      }
      .card-label {
        position: absolute;
        top: 10px;
        left: 12px;
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--text-dim);
        background: rgba(255, 255, 255, 0.82);
        padding: 3px 8px;
        border-radius: 4px;
        backdrop-filter: blur(6px);
        border: 1px solid var(--line-soft);
      }

      .footer {
        flex: none;
        padding: 10px 16px 12px;
        border-top: 1px solid var(--line);
        background: var(--panel);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .progress {
        height: 4px;
        width: 100%;
        background: var(--canvas-bg);
        border-radius: 999px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        width: 0%;
        background: var(--accent);
        transition: width 100ms linear;
      }
      .progress-text {
        font-size: 11px;
        color: var(--text-dim);
        font-variant-numeric: tabular-nums;
      }
      .log {
        height: 90px;
        overflow-y: auto;
        font-size: 10.5px;
        line-height: 1.5;
        font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
        color: var(--text-dim);
        background: #fbfbf8;
        border: 1px solid var(--line-soft);
        border-radius: 8px;
        padding: 6px 10px;
        white-space: pre;
      }

      @media (max-width: 820px) {
        html, body { overflow: auto; }
        .main { min-height: 720px; }
        .canvases {
          grid-template-columns: 1fr;
          align-content: start;
        }
        .canvas-card {
          width: min(100%, 520px);
        }
      }
    </style>
  </head>
  <body>
    <div class="top">
      <div class="brand">SAD Demo</div>

      <label class="file-btn">
        <input id="imageInput" type="file" accept="image/*" />
        <span id="imageLabel">Choose target image</span>
      </label>

      <div class="bpp-group">
        <label>target bpp</label>
        <input id="bppInput" type="range" min="0.2" max="16" step="0.05" value="1.00" />
        <output id="bppValue" class="bpp-value" for="bppInput">1.00</output>
        <span class="bpp-unit">bpp</span>
        <span class="bpp-hint">0.2-16.0</span>
      </div>

      <button class="btn btn-primary" id="startBtn" disabled>Train</button>
      <button class="btn" id="stopBtn" disabled>Stop</button>

      <div class="spacer"></div>

      <button class="btn" id="toggleParamsBtn">Advanced</button>

      <div class="save-menu">
        <button class="btn" id="saveBtn" disabled>Save as…</button>
        <div class="save-popover hidden" id="savePopover">
          <button class="save-opt" id="savePng">PNG image</button>
          <button class="save-opt" id="saveTxt">sites.txt</button>
        </div>
      </div>

      <span class="status-chip" id="status">Loading…</span>
    </div>

    <div class="main">
      <aside class="panel hidden" id="paramsPanel">
        <h3>Input</h3>
        <div class="row">
          <label>mask</label>
          <div class="file-inline">
            <label class="file-btn"><input id="maskInput" type="file" accept="image/*" />Load</label>
            <span class="file-name" id="maskLabel">none</span>
          </div>
        </div>
        <div class="row">
          <label>init sites</label>
          <div class="file-inline">
            <label class="file-btn"><input id="initSitesInput" type="file" accept=".txt,.json" />Load</label>
            <span class="file-name" id="initLabel">gradient init</span>
          </div>
        </div>

        <h3>Sites &amp; iterations</h3>
        <div class="row"><label>iters</label><input id="p-iters" type="number" /></div>
        <div class="row"><label>sites</label><input id="p-sites" type="number" /></div>
        <div class="row"><label>max-sites</label><input id="p-maxSites" type="number" /></div>
        <div class="row"><label>log-freq</label><input id="p-logFreq" type="number" /></div>
        <div class="row"><label>viewer-freq</label><input id="p-viewerFreq" type="number" value="100" /></div>

        <h3>Densify</h3>
        <div class="row"><label>enabled</label><input id="p-densify" type="checkbox" /></div>
        <div class="row"><label>start</label><input id="p-densifyStart" type="number" /></div>
        <div class="row"><label>end</label><input id="p-densifyEnd" type="number" /></div>
        <div class="row"><label>freq</label><input id="p-densifyFreq" type="number" /></div>
        <div class="row"><label>percentile</label><input id="p-densifyPercentile" type="number" step="0.001" /></div>
        <div class="row"><label>score alpha</label><input id="p-densifyScoreAlpha" type="number" step="0.05" /></div>

        <h3>Prune</h3>
        <div class="row"><label>start</label><input id="p-pruneStart" type="number" /></div>
        <div class="row"><label>end</label><input id="p-pruneEnd" type="number" /></div>
        <div class="row"><label>freq</label><input id="p-pruneFreq" type="number" /></div>
        <div class="row"><label>percentile</label><input id="p-prunePercentile" type="number" step="0.001" /></div>
        <div class="row"><label>during densify</label><input id="p-pruneDuringDensify" type="checkbox" /></div>

        <h3>Candidates</h3>
        <div class="row"><label>freq</label><input id="p-candFreq" type="number" /></div>
        <div class="row"><label>passes</label><input id="p-candUpdatePasses" type="number" /></div>
        <div class="row"><label>downscale</label><input id="p-candDownscale" type="number" /></div>
        <div class="row"><label>radius scale</label><input id="p-candRadiusScale" type="number" step="1" /></div>
        <div class="row"><label>radius probes</label><input id="p-candRadiusProbes" type="number" /></div>
        <div class="row"><label>inject count</label><input id="p-candInjectCount" type="number" /></div>
        <div class="row"><label>hilbert window</label><input id="p-candHilbertWindow" type="number" /></div>
        <div class="row"><label>hilbert probes</label><input id="p-candHilbertProbes" type="number" /></div>

        <h3>Learning rates</h3>
        <div class="row"><label>pos</label><input id="p-lrPosBase" type="number" step="0.001" /></div>
        <div class="row"><label>tau</label><input id="p-lrTauBase" type="number" step="0.001" /></div>
        <div class="row"><label>radius</label><input id="p-lrRadiusBase" type="number" step="0.001" /></div>
        <div class="row"><label>color</label><input id="p-lrColorBase" type="number" step="0.001" /></div>
        <div class="row"><label>dir</label><input id="p-lrDirBase" type="number" step="0.001" /></div>
        <div class="row"><label>aniso</label><input id="p-lrAnisoBase" type="number" step="0.001" /></div>
      </aside>

      <section class="view">
        <div class="view-toolbar">
          <span style="color:var(--text-dim)">view</span>
          <select id="viewMode">
            <option value="render">Render</option>
            <option value="centroids" selected>Render + centroids</option>
            <option value="diagram">Site IDs</option>
            <option value="heatmap">Tau heatmap</option>
          </select>
          <div class="metric-row" id="metricRow"></div>
        </div>

        <div class="canvases">
          <div class="canvas-card">
            <span class="card-label">Target</span>
            <canvas id="targetCanvas"></canvas>
          </div>
          <div class="canvas-card">
            <span class="card-label" id="previewLabel">Reconstruction</span>
            <canvas id="previewCanvas"></canvas>
            <canvas id="overlayCanvas" style="position:absolute;pointer-events:none"></canvas>
          </div>
        </div>

        <div class="footer">
          <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
          <div class="progress-text" id="progressText">Idle</div>
          <div class="log" id="logPanel"></div>
        </div>
      </section>
    </div>

    <script type="module" src="train.js?v=viewer-sync-20260423h"></script>
  </body>
</html>
